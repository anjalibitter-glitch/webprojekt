<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Danke</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f3d2e, #1f7a5a, #4caf50, #a5d6a7);
        color: white;
        text-align: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px 60px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
        font-size: 3em;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.3em;
        margin-bottom: 30px;
    }

    .button {
        display: inline-block;
        padding: 12px 25px;
        background: #2e7d32;
        color: white;
        text-decoration: none;
        border-radius: 30px;
        transition: 0.3s;
    }

    .button:hover {
        background: #66bb6a;
    }
</style>

</head>
<body>

<div class="container">
    <h1>🌿 Vielen Dank!</h1>
    <p>Wir haben deine Anfrage erhalten und melden uns so schnell wie möglich bei Dir.</p>
    <p>In der Zwischenzeit wünschen wir dir einen wunderschönen Tag!</p>
    <a href="index.html" class="button">Zurück zur Startseite</a>
</div>

</body>
</html>
